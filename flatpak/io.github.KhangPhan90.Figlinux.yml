id: io.github.KhangPhan90.Figlinux

# Freedesktop SDK/Platform for the system libraries
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk

# BaseApp bundles zypak (Chromium sandbox for Flatpak) + Electron dependencies
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'

# The script that Flatpak runs when the user launches the app
command: run.sh

# Don't split out locale files (Electron bundles its own)
separate-locales: false

# ── Sandbox permissions ───────────────────────────────────────────────────────
finish-args:
  - --share=ipc          # shared memory for X11
  - --share=network      # needed: app loads figma.com
  - --socket=x11         # X11 / XWayland
  - --socket=wayland     # native Wayland
  - --socket=pulseaudio  # audio in prototypes / videos
  - --device=dri         # GPU access for hardware acceleration

  # Font discovery: the font server reads these directories with fc-list
  - --filesystem=/usr/share/fonts:ro
  - --filesystem=/usr/local/share/fonts:ro
  - --filesystem=~/.local/share/fonts:ro
  - --filesystem=~/.fonts:ro

  # Let Electron auto-detect Wayland vs X11 at runtime
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto

# ── Build modules ─────────────────────────────────────────────────────────────
modules:
  - name: figlinux
    buildsystem: simple

    build-options:
      # Point npm to the offline cache that flatpak-node-generator prepared
      env:
        npm_config_cache: /run/build/figlinux/flatpak-node-cache

    build-commands:
      # 1. Pre-seed the Electron binary cache so @electron/get doesn't
      #    try to download it from the internet during `npm install`.
      - mkdir -p $HOME/.cache/electron
      - cp electron-cache/electron-v33.4.11-linux-x64.zip $HOME/.cache/electron/

      # 2. Install npm dependencies from the offline cache.
      - npm install --offline

      # 3. Build an unpacked Linux directory (no installer, just files).
      - npx electron-builder --linux dir --x64

      # 4. Copy the unpacked app to /app/main.
      - cp -r dist/linux-unpacked /app/main

      # 5. Install the launcher script.
      - install -Dm755 flatpak/run.sh /app/bin/run.sh

      # 6. Install the app icon (create assets/icon.png before building).
      - install -Dm644 assets/icon.png
          /app/share/icons/hicolor/256x256/apps/io.github.KhangPhan90.Figlinux.png

      # 7. Install the .desktop entry.
      - install -Dm644
          flatpak/io.github.KhangPhan90.Figlinux.desktop
          /app/share/applications/io.github.KhangPhan90.Figlinux.desktop

      # 8. Install the AppStream metadata.
      - install -Dm644
          flatpak/io.github.KhangPhan90.Figlinux.metainfo.xml
          /app/share/metainfo/io.github.KhangPhan90.Figlinux.metainfo.xml

    sources:
      # ── App source code ──────────────────────────────────────────────────────
      - type: git
        url: https://github.com/KhangPhan90/figlinux.git
        tag: v0.1.0
        # After `git tag v0.1.0 && git push --tags`, run:
        #   git rev-parse v0.1.0
        # and paste the result here:
        commit: FILL_IN_AFTER_TAGGING

      # ── Electron binary (pre-downloaded so the build stays offline) ──────────
      # SHA256 verified from:
      # https://github.com/electron/electron/releases/download/v33.4.11/SHASUMS256.txt
      - type: file
        url: https://github.com/electron/electron/releases/download/v33.4.11/electron-v33.4.11-linux-x64.zip
        sha256: 212d431c7c916292311c797cd91f84467c5abd6e6983cf24b162efff64cee8a9
        dest: electron-cache
        dest-filename: electron-v33.4.11-linux-x64.zip

      # ── npm packages (generated by flatpak-node-generator) ───────────────────
      # Run this command locally to regenerate whenever package-lock.json changes:
      #   flatpak-node-generator npm package-lock.json
      # Then commit the resulting generated-sources.json alongside this manifest.
      - generated-sources.json
